# Auto-Merge Agent
# Enables GitHub's native auto-merge on Dependabot PRs and any PR labelled
# "automerge". GitHub will then merge the PR automatically once all required
# status checks pass — so CI is never bypassed.
#
# Uses pull_request (not pull_request_target) and restricts to trusted actors
# only, avoiding the secrets-exposure risk of pull_request_target with forks.
name: Auto-Merge Agent

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable auto-merge for qualifying PRs
    runs-on: ubuntu-latest
    # Only Dependabot PRs or PRs explicitly labelled "automerge"
    if: |
      github.actor == 'dependabot[bot]' ||
      contains(github.event.pull_request.labels.*.name, 'automerge')

    steps:
      - name: Enable auto-merge via GitHub GraphQL API
        uses: actions/github-script@v9
        with:
          script: |
            const prNodeId = context.payload.pull_request.node_id;

            // Use GraphQL enablePullRequestAutoMerge so that GitHub waits for
            // required checks before merging — CI is never bypassed.
            await github.graphql(`
              mutation($prId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $prId,
                  mergeMethod: SQUASH
                }) {
                  pullRequest { number }
                }
              }
            `, { prId: prNodeId });

            core.info(
              `Auto-merge enabled for PR #${context.payload.pull_request.number}`
            );
