# Scheduled TypeScript lint agent
# Runs tsc --noEmit on a schedule. If it finds errors it opens (or updates)
# a single tracking issue so the Copilot coding agent can pick it up.
name: Auto-Fix Agent

on:
  schedule:
    # Every weekday at 04:00 UTC
    - cron: "0 4 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lint-check:
    name: TypeScript lint check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript lint
        id: lint
        run: |
          set +e
          OUTPUT=$(npm run lint 2>&1)
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          # Safely multiline-encode the output
          {
            echo "output<<EOF_LINT"
            echo "$OUTPUT"
            echo "EOF_LINT"
          } >> "$GITHUB_OUTPUT"

      - name: Open or update tracking issue on failure
        if: steps.lint.outputs.exit_code != '0'
        uses: actions/github-script@v7
        env:
          LINT_OUTPUT: ${{ steps.lint.outputs.output }}
        with:
          script: |
            const lintOutput = process.env.LINT_OUTPUT || "";
            const issueTitle = "🤖 Auto-Fix: TypeScript lint errors detected";
            const issueBody = [
              "<!-- auto-fix-agent -->",
              "The scheduled TypeScript lint check found errors. Please fix them.",
              "",
              "**Run:** `npm run lint`",
              "",
              "```",
              lintOutput.slice(0, 6000), // stay well under GitHub's 65 535-char issue body limit
              "```",
              "",
              `_Detected by the Auto-Fix Agent on ${new Date().toUTCString()}_`,
            ].join("\n");

            // Search for an existing open tracking issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "needs-fix",
            });

            const existing = issues.find(i =>
              i.body && i.body.includes("<!-- auto-fix-agent -->")
            );

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: issueBody,
              });
              core.info(`Updated existing issue #${existing.number}`);
            } else {
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: ["needs-fix"],
              });
              core.info(`Opened new issue #${newIssue.number}`);
            }

      - name: Close resolved tracking issue on success
        if: steps.lint.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "needs-fix",
            });

            for (const issue of issues) {
              if (issue.body && issue.body.includes("<!-- auto-fix-agent -->")) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: "✅ All TypeScript lint checks pass — closing automatically.",
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: "closed",
                });
                core.info(`Closed resolved issue #${issue.number}`);
              }
            }
