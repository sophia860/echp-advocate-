# Copilot Auto-Assign Agent
# Watches for issues labelled "needs-fix" and automatically assigns the
# GitHub Copilot coding agent so it can open a fix PR without human input.
name: Assign Copilot Agent

on:
  issues:
    types:
      - labeled
      - opened

permissions:
  issues: write

jobs:
  assign-copilot:
    name: Assign Copilot to needs-fix issues
    runs-on: ubuntu-latest
    # Only run when the needs-fix label is present
    if: |
      contains(github.event.issue.labels.*.name, 'needs-fix') &&
      !contains(github.event.issue.assignees.*.login, 'copilot')

    steps:
      - name: Assign Copilot coding agent
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: ["copilot"],
            });
            core.info(`Assigned Copilot to issue #${context.issue.number}`);
